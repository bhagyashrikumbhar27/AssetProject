<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Successful</title>
    <style>
        body{font-family:Arial,Helvetica,sans-serif;color:#222}
        .card{max-width:640px;margin:0 auto;border:1px solid #eee;border-radius:8px;overflow:hidden}
        .header{background:#0b6ef6;color:#fff;padding:16px 20px}
        .content{padding:20px}
        .muted{color:#666}
    </style>
</head>
<body>
<div class="card">
    <div class="header">Password Reset Successful</div>
    <div class="content">
        <p>Dear <strong th:text="${name}">User</strong>,</p>
        <p>Your password has been reset successfully.</p>
        <p>If you did not perform this action, please contact support immediately.</p>
        <p>Best regards,<br/>Asset Management System</p>
    </div>
</div>
</body>
</html>
