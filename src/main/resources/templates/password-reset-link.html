<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <style>
        body{font-family:Arial,Helvetica,sans-serif;color:#222}
        .card{max-width:640px;margin:0 auto;border:1px solid #eee;border-radius:8px;overflow:hidden}
        .header{background:#0b6ef6;color:#fff;padding:16px 20px}
        .content{padding:20px}
        a.btn{background:#0b6ef6;color:#fff;padding:10px 14px;border-radius:6px;text-decoration:none}
        .muted{color:#666}
    </style>
</head>
<body>
<div class="card">
    <div class="header">Password Reset Request</div>
    <div class="content">
        <p>Dear <strong th:text="${name}">User</strong>,</p>
        <p>We received a request to reset your password.</p>
        <p>
            <a class="btn" th:href="${resetLink}">Reset your password</a>
        </p>
        <p class="muted">This link will expire in <span th:text="${expiryMinutes}">15</span> minutes.</p>
        <p>If you did not request this, please ignore this email.</p>
        <p>Best regards,<br/>Asset Management System</p>
    </div>
</div>
</body>
</html>
